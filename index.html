<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>数学教学动画</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <!-- 移动端遮罩层（点击关闭侧边栏） -->
  <div id="sidebar-backdrop"></div>

  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">∑</span>
          <div>
            <div class="logo-title">数学教学动画</div>
            <div class="logo-sub">Math Animations</div>
          </div>
        </div>
        <!-- 桌面端收起按钮（移动端改用 #topbar 的按钮） -->
        <button id="sidebar-close" aria-label="关闭菜单">✕</button>
      </div>
      <nav id="nav-tree"></nav>
    </aside>

    <!-- Main content -->
    <main id="main">
      <!-- 移动端顶部栏（桌面端隐藏） -->
      <div id="topbar">
        <button id="topbar-menu" aria-label="打开菜单">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <rect y="3"  width="20" height="2.2" rx="1.1"/>
            <rect y="9"  width="20" height="2.2" rx="1.1"/>
            <rect y="15" width="20" height="2.2" rx="1.1"/>
          </svg>
        </button>
        <span id="topbar-title">数学教学动画</span>
      </div>

      <!-- Welcome screen -->
      <div id="welcome-screen">
        <div class="welcome-content">
          <span class="welcome-icon">✨</span>
          <h2>数学的世界，等你来探索！</h2>
          <p>点击左侧菜单，选一个你想学的内容吧 ☞</p>
          <div class="feature-list">
            <div class="feature-item">🎬 动态演示，让抽象的数学变得看得见</div>
            <div class="feature-item">🎮 动手探索，自己发现数学规律</div>
            <div class="feature-item">📊 多种模型，从不同角度理解数学</div>
          </div>
        </div>
      </div>

      <!-- Lesson view -->
      <div id="lesson-view" class="hidden">
        <div id="lesson-header">
          <div id="lesson-breadcrumb"></div>
          <h2 id="lesson-title"></h2>
        </div>
        <div id="canvas-container"></div>
        <div id="controls-container"></div>
        <div id="description-container"></div>
      </div>
    </main>
  </div>

  <!-- 第三方库（本地，离线可用） -->
  <script src="lib/gsap.min.js"></script>
  <script src="lib/p5.min.js"></script>
  <script src="lib/anime.min.js"></script>

  <!-- Shared utilities -->
  <script src="shared/utils.js"></script>

  <!-- Navigation -->
  <script src="assets/nav.js"></script>
</body>
</html>
